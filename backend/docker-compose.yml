services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: propval
      POSTGRES_PASSWORD: propval
      POSTGRES_DB: propval
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propval"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://propval:propval@db:5432/propval"
    volumes:
      - ./:/app
      - reports_vol:/tmp/reports
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  reports_vol:
